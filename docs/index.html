<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Sovereign - Karen Memory Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
        }
        
        #header {
            background: linear-gradient(135deg, #1a1f2e 0%, #2a2f3e 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #3a4050;
        }
        
        #header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        
        #header .subtitle {
            font-size: 12px;
            color: #a0a0a0;
        }
        
        #canvas {
            width: 100%;
            height: calc(100vh - 80px);
            background: #0f1419;
        }
        
        svg {
            width: 100%;
            height: 100%;
        }
        
        .node {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 2px;
        }
        
        .node:hover {
            stroke-width: 3px;
            filter: brightness(1.2);
        }
        
        .node.selected {
            stroke: #FFD700;
            stroke-width: 4px;
            filter: brightness(1.3);
        }
        
        .link {
            stroke: #4a5568;
            stroke-width: 1.5px;
            stroke-opacity: 0.6;
            pointer-events: none;
        }
        
        text {
            font-size: 11px;
            pointer-events: none;
            fill: #e0e0e0;
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.8);
            text-anchor: middle;
            dominant-baseline: middle;
        }
        
        #sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 400px;
            height: 100vh;
            background: #1a1f2e;
            border-left: 1px solid #3a4050;
            padding: 20px;
            overflow-y: auto;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        
        #sidebar.show {
            transform: translateX(0);
        }
        
        .sidebar-header {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 15px;
            border-bottom: 1px solid #3a4050;
            padding-bottom: 10px;
        }
        
        .sidebar-section {
            margin-bottom: 20px;
        }
        
        .sidebar-label {
            font-size: 11px;
            color: #8a8a8a;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        
        .sidebar-value {
            font-size: 13px;
            color: #e0e0e0;
            line-height: 1.5;
        }
        
        .info-box {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 31, 46, 0.95);
            border: 1px solid #3a4050;
            border-radius: 8px;
            padding: 15px;
            font-size: 12px;
            z-index: 100;
        }
        
        .info-value {
            color: #4A90E2;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Bifrost Sovereign Memory Graph</h1>
        <div class="subtitle">Interactive mindmap • Bifrost at center, everything radiates outward</div>
    </div>
    
    <div id="canvas">
        <svg id="graph"></svg>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-header" id="sidebarTitle">Select a node</div>
        <div id="sidebarContent"></div>
    </div>
    
    <div class="info-box">
        <div>Nodes: <span class="info-value" id="nodeCount">0</span></div>
        <div>Relations: <span class="info-value" id="edgeCount">0</span></div>
    </div>

    <script>
        let graph = null;
        let simulation = null;
        
        async function init() {
            const res = await fetch('graph-data.json');
            graph = await res.json();
            
            document.getElementById('nodeCount').textContent = graph.nodes.length;
            document.getElementById('edgeCount').textContent = graph.edges.length;
            
            renderMindmap();
        }
        
        function renderMindmap() {
            const width = document.getElementById('canvas').clientWidth;
            const height = document.getElementById('canvas').clientHeight;
            
            const svg = d3.select('#graph');
            svg.selectAll('*').remove();
            
            const g = svg.append('g');
            
            // Zoom
            const zoom = d3.zoom().on('zoom', (event) => {
                g.attr('transform', event.transform);
            });
            svg.call(zoom);
            
            // Create hierarchical layout: Bifrost at center
            const nodes = graph.nodes.map(d => ({...d}));
            const links = graph.edges.map(d => ({
                source: d.source,
                target: d.target,
                relation: d.relation,
                weight: d.weight || 1
            }));
            
            // Pin Bifrost to center
            const bifrost = nodes.find(n => n.id === 'bifrost');
            if (bifrost) {
                bifrost.fx = width / 2;
                bifrost.fy = height / 2;
            }
            
            // Create simulation
            simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links)
                    .id(d => d.id)
                    .distance(d => {
                        // Short links to Bifrost, longer for others
                        if (d.source.id === 'bifrost' || d.target.id === 'bifrost') return 150;
                        return 200;
                    })
                    .strength(0.1))
                .force('charge', d3.forceManyBody()
                    .strength(-800)
                    .distanceMin(50)
                    .distanceMax(1000))
                .force('center', d3.forceCenter(width / 2, height / 2).strength(0.02))
                .force('collision', d3.forceCollide()
                    .radius(d => d.size + 15)
                    .strength(0.9))
                .alphaTarget(0.1)
                .alphaDecay(0.0008);
            
            // Draw links
            const link = g.append('g')
                .selectAll('line')
                .data(links)
                .enter()
                .append('line')
                .attr('class', 'link')
                .attr('stroke-width', d => Math.max(1, d.weight * 0.7));
            
            // Draw nodes
            const node = g.append('g')
                .selectAll('circle')
                .data(nodes)
                .enter()
                .append('circle')
                .attr('class', 'node')
                .attr('r', d => d.size || 30)
                .attr('fill', d => d.color)
                .on('click', (e, d) => selectNode(d))
                .call(drag(simulation));
            
            // Draw labels
            const labels = g.append('g')
                .selectAll('text')
                .data(nodes)
                .enter()
                .append('text')
                .text(d => {
                    if (d.id === 'bifrost') return 'Bifrost\nSovereign';
                    const words = d.label.split(' ');
                    return words[0].substring(0, 10);
                })
                .attr('font-weight', d => d.id === 'bifrost' ? 'bold' : 'normal')
                .attr('font-size', d => d.id === 'bifrost' ? '14px' : '11px');
            
            // Update positions on tick
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node
                    .attr('cx', d => d.x)
                    .attr('cy', d => d.y);
                
                labels
                    .attr('x', d => d.x)
                    .attr('y', d => d.y);
            });
            
            // Zoom to fit
            setTimeout(() => {
                const bounds = g.node().getBBox();
                const midX = bounds.x + bounds.width / 2;
                const midY = bounds.y + bounds.height / 2;
                const scale = Math.min(width / bounds.width, height / bounds.height) * 0.8;
                svg.transition().duration(750).call(zoom.transform,
                    d3.zoomIdentity
                        .translate(width / 2, height / 2)
                        .scale(scale)
                        .translate(-midX, -midY)
                );
            }, 500);
        }
        
        function selectNode(d) {
            d3.selectAll('.node').classed('selected', n => n.id === d.id);
            
            const sidebar = document.getElementById('sidebar');
            document.getElementById('sidebarTitle').textContent = d.label;
            
            let html = `
                <div class="sidebar-section">
                    <div class="sidebar-label">Type</div>
                    <div class="sidebar-value" style="color: #4A90E2;">${d.type.replace(/_/g, ' ')}</div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-label">Description</div>
                    <div class="sidebar-value">${d.description || 'No description'}</div>
                </div>
            `;
            
            if (d.type === 'person' && d.actionsOwned) {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Details</div>
                        <div class="sidebar-value">
                            <strong>Actions:</strong> ${d.actionsOwned}<br>
                            <strong>Last Active:</strong> ${d.lastActive || '—'}
                        </div>
                    </div>
                `;
            } else if (d.type === 'action_item') {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Task</div>
                        <div class="sidebar-value">
                            <strong>Owner:</strong> ${d.owner || '—'}<br>
                            <strong>Due:</strong> ${d.deadline || '—'}<br>
                            <strong>Status:</strong> ${d.status || 'Open'}
                        </div>
                    </div>
                `;
            }
            
            // Related nodes
            const related = graph.edges.filter(e => e.source === d.id || e.target === d.id);
            if (related.length > 0) {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Connected (${related.length})</div>
                        <div class="sidebar-value" style="font-size: 12px; line-height: 2;">
                            ${related.map(e => {
                                const relId = e.source === d.id ? e.target : e.source;
                                const relNode = graph.nodes.find(n => n.id === relId);
                                return relNode ? `${e.relation}<br><strong>${relNode.label}</strong>` : '';
                            }).join('<br>—<br>')}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('sidebarContent').innerHTML = html;
            sidebar.classList.add('show');
        }
        
        function drag(simulation) {
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0.1);
                d.fx = null;
                d.fy = null;
            }
            
            return d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended);
        }
        
        window.addEventListener('load', init);
    </script>
</body>
</html>
