<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Sovereign - Karen Memory Graph</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
        }
        
        #header {
            background: linear-gradient(135deg, #1a1f2e 0%, #2a2f3e 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #3a4050;
        }
        
        #header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        
        #header .subtitle {
            font-size: 12px;
            color: #a0a0a0;
        }
        
        #cy {
            width: 100%;
            height: calc(100vh - 80px);
            background: #0f1419;
        }
        
        .button {
            display: inline-block;
            padding: 8px 14px;
            margin-right: 8px;
            background: #4A90E2;
            border: 1px solid #3a5fa8;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 12px;
        }
        
        .button:hover {
            background: #5a9ef2;
        }
        
        #sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 400px;
            height: 100vh;
            background: #1a1f2e;
            border-left: 1px solid #3a4050;
            padding: 20px;
            overflow-y: auto;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        
        #sidebar.show {
            transform: translateX(0);
        }
        
        .sidebar-header {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 15px;
            border-bottom: 1px solid #3a4050;
            padding-bottom: 10px;
        }
        
        .sidebar-section {
            margin-bottom: 20px;
        }
        
        .sidebar-label {
            font-size: 11px;
            color: #8a8a8a;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        
        .sidebar-value {
            font-size: 13px;
            color: #e0e0e0;
            line-height: 1.5;
        }
        
        .info-box {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 31, 46, 0.95);
            border: 1px solid #3a4050;
            border-radius: 8px;
            padding: 15px;
            font-size: 12px;
            z-index: 100;
        }
        
        .info-value {
            color: #4A90E2;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Bifrost Sovereign Memory Graph</h1>
        <div class="subtitle">Interactive mindmap • Bifrost at the center, radiating to all operations</div>
        <button class="button" onclick="resetView()">Reset View</button>
    </div>
    
    <div id="cy"></div>
    
    <div id="sidebar">
        <div class="sidebar-header" id="sidebarTitle">Select a node</div>
        <div id="sidebarContent"></div>
    </div>
    
    <div class="info-box">
        <div>Nodes: <span class="info-value" id="nodeCount">0</span></div>
        <div>Relations: <span class="info-value" id="edgeCount">0</span></div>
    </div>

    <script>
        let cy = null;
        let fullGraph = null;
        
        async function initGraph() {
            const res = await fetch('graph-data.json');
            fullGraph = await res.json();
            
            document.getElementById('nodeCount').textContent = fullGraph.nodes.length;
            document.getElementById('edgeCount').textContent = fullGraph.edges.length;
            
            renderMindmap();
        }
        
        function renderMindmap() {
            // Build hierarchical structure
            const cyNodes = fullGraph.nodes.map(n => ({
                data: {
                    id: n.id,
                    label: n.label,
                    type: n.type,
                    description: n.description,
                    ...n
                },
                style: {
                    'background-color': n.color,
                    'width': Math.max(30, Math.min(60, n.size || 30)),
                    'height': Math.max(30, Math.min(60, n.size || 30))
                }
            }));
            
            const cyEdges = fullGraph.edges.map((e, i) => ({
                data: {
                    id: `e${i}`,
                    source: e.source,
                    target: e.target,
                    relation: e.relation,
                    weight: e.weight || 1
                }
            }));
            
            if (cy) cy.destroy();
            
            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: [...cyNodes, ...cyEdges],
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'font-size': '11px',
                            'color': '#fff',
                            'border-width': '2px',
                            'border-color': '#fff',
                            'cursor': 'pointer',
                            'text-wrap': 'wrap',
                            'text-max-width': '80px'
                        }
                    },
                    {
                        selector: 'node[id="bifrost"]',
                        style: {
                            'width': 80,
                            'height': 80,
                            'font-size': '14px',
                            'font-weight': 'bold'
                        }
                    },
                    {
                        selector: 'node:selected',
                        style: {
                            'border-color': '#FFD700',
                            'border-width': '4px',
                            'box-shadow': '0 0 15px #FFD700'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'line-color': '#4a5568',
                            'width': 'mapData(weight, 1, 3, 1, 2)',
                            'opacity': '0.5',
                            'curve-style': 'straight',
                            'target-arrow-shape': 'none'
                        }
                    },
                    {
                        selector: 'edge:selected',
                        style: {
                            'line-color': '#FFD700',
                            'opacity': '1',
                            'width': '3px'
                        }
                    }
                ],
                wheelSensitivity: 0.1
            });
            
            cy.on('tap', 'node', onNodeClick);
            cy.on('tap', onBackgroundClick);
            
            runMindmapLayout();
        }
        
        function runMindmapLayout() {
            if (!cy) return;
            
            const layout = cy.layout({
                name: 'concentric',
                directed: false,
                roots: '#bifrost',
                concentric: function(node) {
                    // Bifrost at center (highest concentric level)
                    if (node.id() === 'bifrost') return 10;
                    
                    // People and Business Functions next ring
                    if (['person', 'business_function'].includes(node.data('type'))) return 9;
                    
                    // Meetings, Actions, Decisions next
                    if (['meeting', 'action_item', 'decision'].includes(node.data('type'))) return 8;
                    
                    // Everything else outer
                    return 7;
                },
                levelWidth: function(nodes) {
                    return nodes.maxDegree() / 4;
                },
                animate: true,
                animationDuration: 800,
                fit: true,
                padding: 100,
                startAngle: 3 / 2 * Math.PI,
                clockwise: true,
                equidistant: false
            });
            
            layout.run();
        }
        
        function resetView() {
            if (cy) {
                cy.fit(null, 100);
            }
        }
        
        function onNodeClick(e) {
            const node = e.target.data();
            const sidebar = document.getElementById('sidebar');
            
            document.getElementById('sidebarTitle').textContent = node.label;
            
            let html = `
                <div class="sidebar-section">
                    <div class="sidebar-label">Type</div>
                    <div class="sidebar-value" style="color: #4A90E2; font-weight: 600;">${node.type.replace(/_/g, ' ')}</div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-label">Description</div>
                    <div class="sidebar-value">${node.description || 'No description'}</div>
                </div>
            `;
            
            // Add metadata based on type
            if (node.type === 'person' && node.actionsOwned) {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Workload</div>
                        <div class="sidebar-value">
                            <strong>Actions:</strong> ${node.actionsOwned}<br>
                            <strong>Active:</strong> ${node.lastActive || 'Unknown'}
                        </div>
                    </div>
                `;
            } else if (node.type === 'action_item') {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Task Details</div>
                        <div class="sidebar-value">
                            <strong>Owner:</strong> ${node.owner || 'Unassigned'}<br>
                            <strong>Due:</strong> ${node.deadline || 'No deadline'}<br>
                            <strong>Status:</strong> ${node.status || 'Open'}
                            ${node.isOverdue ? '<br><strong style="color: #C0392B;">⚠️ OVERDUE</strong>' : ''}
                        </div>
                    </div>
                `;
            } else if (node.type === 'business_function') {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Workstream</div>
                        <div class="sidebar-value">
                            <strong>Owner:</strong> ${node.owner || 'TBD'}
                        </div>
                    </div>
                `;
            } else if (node.type === 'meeting') {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Meeting</div>
                        <div class="sidebar-value">
                            <strong>Frequency:</strong> ${node.frequency || 'Recurring'}<br>
                            <strong>Type:</strong> Team sync
                        </div>
                    </div>
                `;
            }
            
            // Show connected nodes
            const connectedEdges = fullGraph.edges.filter(e => e.source === node.id || e.target === node.id);
            if (connectedEdges.length > 0) {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Connected (${connectedEdges.length})</div>
                        <div class="sidebar-value" style="font-size: 12px;">
                            ${connectedEdges.map(e => {
                                const relId = e.source === node.id ? e.target : e.source;
                                const relNode = fullGraph.nodes.find(n => n.id === relId);
                                return relNode ? `<div style="margin-bottom: 8px;">
                                    <strong>${e.relation}:</strong><br>
                                    ${relNode.label}
                                </div>` : '';
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('sidebarContent').innerHTML = html;
            sidebar.classList.add('show');
        }
        
        function onBackgroundClick(e) {
            if (e.target === cy) {
                document.getElementById('sidebar').classList.remove('show');
            }
        }
        
        window.addEventListener('load', initGraph);
    </script>
</body>
</html>
