<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Sovereign - Karen Memory Graph</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
        }
        
        #header {
            background: linear-gradient(135deg, #1a1f2e 0%, #2a2f3e 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #3a4050;
        }
        
        #header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        
        #header .subtitle {
            font-size: 12px;
            color: #a0a0a0;
        }
        
        #cy {
            width: 100%;
            height: calc(100vh - 80px);
            background: #0f1419;
        }
        
        .tab-btn {
            display: inline-block;
            padding: 8px 14px;
            margin-right: 8px;
            background: #3a4050;
            border: 1px solid #4a5060;
            color: #a0a0a0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background: #4A90E2;
            border-color: #4A90E2;
            color: #fff;
        }
        
        .tab-btn:hover {
            background: #4A90E2;
            color: #fff;
        }
        
        .button {
            display: inline-block;
            padding: 8px 14px;
            margin-right: 8px;
            background: #4A90E2;
            border: 1px solid #3a5fa8;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .button:hover {
            background: #5a9ef2;
        }
        
        #sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 400px;
            height: 100vh;
            background: #1a1f2e;
            border-left: 1px solid #3a4050;
            padding: 20px;
            overflow-y: auto;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        
        #sidebar.show {
            transform: translateX(0);
        }
        
        .sidebar-header {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 15px;
            border-bottom: 1px solid #3a4050;
            padding-bottom: 10px;
        }
        
        .sidebar-section {
            margin-bottom: 20px;
        }
        
        .sidebar-label {
            font-size: 11px;
            color: #8a8a8a;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        
        .sidebar-value {
            font-size: 13px;
            color: #e0e0e0;
            line-height: 1.5;
        }
        
        .info-box {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 31, 46, 0.95);
            border: 1px solid #3a4050;
            border-radius: 8px;
            padding: 15px;
            font-size: 12px;
            z-index: 100;
        }
        
        .info-value {
            color: #4A90E2;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Bifrost Sovereign Memory Graph</h1>
        <div class="subtitle">Interactive knowledge graph • 85 entities • 118 relationships</div>
        <div style="margin-top: 15px;">
            <button class="tab-btn active" onclick="filterNodes('all')">All</button>
            <button class="tab-btn" onclick="filterNodes('person')">People</button>
            <button class="tab-btn" onclick="filterNodes('meeting')">Meetings</button>
            <button class="tab-btn" onclick="filterNodes('action_item')">Actions</button>
            <button class="button" onclick="resetLayout()">Reset</button>
        </div>
    </div>
    
    <div id="cy"></div>
    
    <div id="sidebar">
        <div class="sidebar-header" id="sidebarTitle">Select a node</div>
        <div id="sidebarContent"></div>
    </div>
    
    <div class="info-box">
        <div>Nodes: <span class="info-value" id="nodeCount">0</span></div>
        <div>Edges: <span class="info-value" id="edgeCount">0</span></div>
    </div>

    <script>
        let cy = null;
        let fullGraph = null;
        
        async function initGraph() {
            // Load graph data
            const res = await fetch('graph-data.json');
            fullGraph = await res.json();
            
            document.getElementById('nodeCount').textContent = fullGraph.nodes.length;
            document.getElementById('edgeCount').textContent = fullGraph.edges.length;
            
            renderGraph(fullGraph.nodes, fullGraph.edges);
        }
        
        function renderGraph(nodes, edges) {
            // Build Cytoscape elements
            const cyNodes = nodes.map(n => ({
                data: {
                    id: n.id,
                    label: n.label,
                    type: n.type,
                    description: n.description,
                    ...n
                },
                style: {
                    'background-color': n.color,
                    'width': Math.max(20, Math.min(50, n.size || 30)),
                    'height': Math.max(20, Math.min(50, n.size || 30))
                }
            }));
            
            const cyEdges = edges.map((e, i) => ({
                data: {
                    id: `e${i}`,
                    source: e.source,
                    target: e.target,
                    relation: e.relation,
                    weight: e.weight || 1
                }
            }));
            
            // Destroy old instance
            if (cy) cy.destroy();
            
            // Create new instance
            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: [...cyNodes, ...cyEdges],
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'font-size': '11px',
                            'color': '#fff',
                            'border-width': '2px',
                            'border-color': '#fff',
                            'cursor': 'pointer'
                        }
                    },
                    {
                        selector: 'node:selected',
                        style: {
                            'border-color': '#FFD700',
                            'border-width': '4px',
                            'box-shadow': '0 0 10px #FFD700'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'line-color': '#4a5568',
                            'width': 'mapData(weight, 1, 3, 1, 2)',
                            'opacity': '0.6',
                            'curve-style': 'straight'
                        }
                    }
                ],
                layout: {
                    name: 'grid',
                    rows: 1
                },
                wheelSensitivity: 0.1
            });
            
            // Event handlers
            cy.on('tap', 'node', onNodeClick);
            cy.on('tap', onBackgroundClick);
            
            // Run layout
            resetLayout();
        }
        
        function resetLayout() {
            if (!cy) return;
            
            const nodeCount = cy.nodes().length;
            const layoutName = nodeCount > 30 ? 'grid' : 'circle';
            
            const layout = cy.layout({
                name: layoutName,
                directed: false,
                avoidOverlap: true,
                nodeDimensionsIncludeLabels: true,
                spacingFactor: 2,
                animate: true,
                animationDuration: 800,
                fit: true,
                padding: 100,
                condense: true,
                rows: nodeCount > 50 ? Math.ceil(Math.sqrt(nodeCount)) : undefined,
                cols: nodeCount > 50 ? Math.ceil(Math.sqrt(nodeCount)) : undefined
            });
            
            layout.run();
        }
        
        function filterNodes(type) {
            // Update button state
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            let nodes = fullGraph.nodes;
            let edges = fullGraph.edges;
            
            if (type !== 'all') {
                nodes = fullGraph.nodes.filter(n => n.type === type);
                const nodeIds = new Set(nodes.map(n => n.id));
                edges = fullGraph.edges.filter(e => nodeIds.has(e.source) && nodeIds.has(e.target));
            }
            
            document.getElementById('nodeCount').textContent = nodes.length;
            document.getElementById('edgeCount').textContent = edges.length;
            
            renderGraph(nodes, edges);
        }
        
        function onNodeClick(e) {
            const node = e.target.data();
            const sidebar = document.getElementById('sidebar');
            
            document.getElementById('sidebarTitle').textContent = node.label;
            
            let html = `
                <div class="sidebar-section">
                    <div class="sidebar-label">Type</div>
                    <div class="sidebar-value">${node.type.replace(/_/g, ' ')}</div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-label">Description</div>
                    <div class="sidebar-value">${node.description || 'No description'}</div>
                </div>
            `;
            
            // Add metadata
            if (node.type === 'person' && node.actionsOwned) {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Actions Owned</div>
                        <div class="sidebar-value">${node.actionsOwned}</div>
                    </div>
                `;
            } else if (node.type === 'action_item' && node.deadline) {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Deadline</div>
                        <div class="sidebar-value">${node.deadline}</div>
                    </div>
                    <div class="sidebar-section">
                        <div class="sidebar-label">Status</div>
                        <div class="sidebar-value">${node.status || 'Open'}</div>
                    </div>
                `;
            }
            
            document.getElementById('sidebarContent').innerHTML = html;
            sidebar.classList.add('show');
        }
        
        function onBackgroundClick(e) {
            if (e.target === cy) {
                document.getElementById('sidebar').classList.remove('show');
            }
        }
        
        // Init on load
        window.addEventListener('load', initGraph);
    </script>
</body>
</html>
