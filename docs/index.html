<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Sovereign - Karen Memory Graph v2</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            overflow: hidden;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: linear-gradient(135deg, #1a1f2e 0%, #2a2f3e 100%);
            padding: 16px 30px;
            border-bottom: 1px solid #3a4050;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-left h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin: 0 0 4px 0;
        }
        
        .header-left .subtitle {
            font-size: 12px;
            color: #a0a0a0;
        }
        
        .header-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .tab-group {
            display: flex;
            gap: 8px;
            background: rgba(58, 64, 80, 0.5);
            padding: 8px;
            border-radius: 6px;
        }
        
        .tab-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid #3a4050;
            color: #a0a0a0;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .tab-btn.active {
            background: #4A90E2;
            border-color: #4A90E2;
            color: #fff;
        }
        
        .tab-btn:hover {
            border-color: #4A90E2;
            color: #fff;
        }
        
        #canvas {
            flex: 1;
            background: #0f1419;
            position: relative;
            overflow: hidden;
        }
        
        svg {
            width: 100%;
            height: 100%;
        }
        
        .node {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 2px;
            transition: all 0.2s;
        }
        
        .node:hover {
            stroke-width: 3px;
            filter: brightness(1.2);
        }
        
        .node.selected {
            stroke: #FFD700;
            stroke-width: 4px;
            filter: brightness(1.3);
        }
        
        .node.dimmed {
            opacity: 0.2;
        }
        
        .link {
            stroke: #4a5568;
            stroke-width: 1.5px;
            stroke-opacity: 0.6;
        }
        
        .link.active {
            stroke: #FFD700;
            stroke-width: 2.5px;
            stroke-opacity: 1;
        }
        
        .link.dimmed {
            opacity: 0.1;
        }
        
        text {
            font-size: 11px;
            pointer-events: none;
            fill: #e0e0e0;
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.8);
            text-anchor: middle;
        }
        
        #sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 420px;
            height: 100vh;
            background: #1a1f2e;
            border-left: 1px solid #3a4050;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
            padding: 20px;
        }
        
        #sidebar.hidden {
            transform: translateX(100%);
        }
        
        .sidebar-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #fff;
            border-bottom: 1px solid #3a4050;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .node-type-badge {
            background: #3a4050;
            color: #fff;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            text-transform: uppercase;
        }
        
        .sidebar-section {
            margin-bottom: 20px;
        }
        
        .sidebar-label {
            font-size: 11px;
            color: #8a8a8a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        
        .sidebar-value {
            font-size: 13px;
            color: #e0e0e0;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        
        .relation-tag {
            display: inline-block;
            background: #3a4050;
            color: #fff;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            margin-right: 6px;
            margin-bottom: 6px;
        }
        
        .metadata-table {
            width: 100%;
            font-size: 12px;
            border-collapse: collapse;
        }
        
        .metadata-table td {
            padding: 4px;
            border-bottom: 1px solid #2a2f3e;
        }
        
        .metadata-table td:first-child {
            color: #8a8a8a;
            width: 40%;
            text-align: right;
            padding-right: 12px;
        }
        
        .controls {
            position: fixed;
            left: 20px;
            bottom: 20px;
            background: rgba(26, 31, 46, 0.95);
            border: 1px solid #3a4050;
            border-radius: 8px;
            padding: 15px;
            z-index: 100;
            min-width: 220px;
        }
        
        .control-group {
            margin-bottom: 12px;
        }
        
        .control-label {
            font-size: 11px;
            color: #8a8a8a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        
        input[type="range"] {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: #3a4050;
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4A90E2;
            cursor: pointer;
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4A90E2;
            cursor: pointer;
            border: none;
        }
        
        button {
            background: #4A90E2;
            border: 1px solid #3a5fa8;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        
        button:hover {
            background: #5a9ef2;
        }
        
        .stats {
            position: fixed;
            left: 20px;
            top: 20px;
            background: rgba(26, 31, 46, 0.95);
            border: 1px solid #3a4050;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 12px;
            color: #a0a0a0;
            z-index: 100;
        }
        
        .stat-row {
            margin-bottom: 6px;
        }
        
        .stat-value {
            color: #4A90E2;
            font-weight: 600;
        }
        
        .type-legend {
            position: fixed;
            left: 20px;
            top: 140px;
            background: rgba(26, 31, 46, 0.95);
            border: 1px solid #3a4050;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 11px;
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
        }
        
        .entity-link {
            color: #4A90E2;
            cursor: pointer;
            text-decoration: underline;
        }
        
        .entity-link:hover {
            color: #5a9ef2;
        }
    </style>
</head>
<body>
    <div id="container">
        <header>
            <div class="header-left">
                <h1>Bifrost Sovereign Memory Graph</h1>
                <div class="subtitle">Interactive knowledge graph v2.0 • People • Meetings • Decisions • Actions • Files</div>
            </div>
            <div class="header-right">
                <div class="tab-group">
                    <button class="tab-btn active" onclick="setFilter('all')">All</button>
                    <button class="tab-btn" onclick="setFilter('person')">People</button>
                    <button class="tab-btn" onclick="setFilter('meeting')">Meetings</button>
                    <button class="tab-btn" onclick="setFilter('action_item')">Actions</button>
                    <button class="tab-btn" onclick="setFilter('decision')">Decisions</button>
                    <button class="tab-btn" onclick="setFilter('file')">Files</button>
                    <button class="tab-btn" onclick="setFilter('blocker')">Blockers</button>
                </div>
            </div>
        </header>
        <div id="canvas">
            <svg id="graph"></svg>
        </div>
        
        <div id="sidebar" class="hidden">
            <div class="sidebar-header">
                <span id="nodeTitle">Select a node</span>
                <span class="node-type-badge" id="nodeType"></span>
            </div>
            <div id="nodeDetails"></div>
        </div>
        
        <div class="stats">
            <div class="stat-row">Entities: <span class="stat-value" id="nodeCount">0</span></div>
            <div class="stat-row">Relations: <span class="stat-value" id="linkCount">0</span></div>
        </div>
        
        <div class="type-legend" id="legend"></div>
        
        <div class="controls">
            <div class="control-group">
                <div class="control-label">Force Strength</div>
                <input type="range" id="forceStrength" min="0.1" max="5" step="0.1" value="1">
            </div>
            <button onclick="resetZoom()">Reset View</button>
        </div>
    </div>

    <script>
        const graphUrl = 'graph-data.json';
        
        let graph = null;
        let simulation = null;
        let selectedNode = null;
        let currentFilter = 'all';
        
        // Load and render graph
        async function loadGraph() {
            try {
                const response = await fetch(graphUrl);
                graph = await response.json();
                renderGraph();
                buildLegend();
            } catch (error) {
                console.error('Error loading graph:', error);
                document.getElementById('nodeTitle').textContent = 'Error loading graph data';
            }
        }
        
        function buildLegend() {
            const typeMap = {};
            graph.nodes.forEach(n => {
                if (!typeMap[n.type]) {
                    typeMap[n.type] = n.color;
                }
            });
            
            const legendHtml = Object.entries(typeMap).map(([type, color]) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${color};"></div>
                    <span>${type.replace(/_/g, ' ')}</span>
                </div>
            `).join('');
            
            document.getElementById('legend').innerHTML = legendHtml;
        }
        
        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGraph();
        }
        
        function renderGraph() {
            const width = document.getElementById('canvas').clientWidth;
            const height = document.getElementById('canvas').clientHeight;
            
            const svg = d3.select('#graph');
            svg.selectAll('*').remove();
            
            // Filter nodes based on current filter
            let visibleNodeIds = new Set();
            let filteredNodes = graph.nodes;
            
            if (currentFilter !== 'all') {
                filteredNodes = graph.nodes.filter(n => n.type === currentFilter);
            }
            
            filteredNodes.forEach(n => visibleNodeIds.add(n.id));
            
            // Filter edges to only show connections between visible nodes
            const filteredEdges = graph.edges.filter(e => 
                visibleNodeIds.has(e.source) && visibleNodeIds.has(e.target)
            );
            
            // Update stats
            document.getElementById('nodeCount').textContent = filteredNodes.length;
            document.getElementById('linkCount').textContent = filteredEdges.length;
            
            const g = svg.append('g');
            
            const zoom = d3.zoom().on('zoom', (event) => {
                g.attr('transform', event.transform);
            });
            svg.call(zoom);
            
            // Create force simulation
            simulation = d3.forceSimulation(filteredNodes)
                .force('link', d3.forceLink(filteredEdges)
                    .id(d => d.id)
                    .distance(100)
                    .strength(0.1))
                .force('charge', d3.forceManyBody().strength(-400))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => d.size + 8));
            
            // Draw edges
            const link = g.append('g')
                .selectAll('line')
                .data(filteredEdges)
                .enter()
                .append('line')
                .attr('class', 'link')
                .attr('stroke-width', d => d.weight * 0.5);
            
            // Draw nodes
            const node = g.append('g')
                .selectAll('circle')
                .data(filteredNodes)
                .enter()
                .append('circle')
                .attr('class', 'node')
                .attr('r', d => d.size)
                .attr('fill', d => d.color)
                .on('click', (event, d) => selectNode(d, event))
                .call(drag(simulation));
            
            // Add labels
            const labels = g.append('g')
                .selectAll('text')
                .data(filteredNodes)
                .enter()
                .append('text')
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'middle')
                .text(d => {
                    const words = d.label.split(' ');
                    return words[0].substring(0, 8);
                })
                .style('pointer-events', 'none');
            
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node
                    .attr('cx', d => d.x)
                    .attr('cy', d => d.y);
                
                labels
                    .attr('x', d => d.x)
                    .attr('y', d => d.y);
            });
            
            // Zoom to fit
            const bounds = g.node().getBBox();
            const midX = bounds.x + bounds.width / 2;
            const midY = bounds.y + bounds.height / 2;
            const scale = Math.min(width / bounds.width, height / bounds.height) * 0.85;
            svg.transition().duration(750).call(zoom.transform,
                d3.zoomIdentity
                    .translate(width / 2, height / 2)
                    .scale(scale)
                    .translate(-midX, -midY)
            );
        }
        
        function selectNode(d, event) {
            event.stopPropagation();
            selectedNode = d;
            
            d3.selectAll('.node').classed('selected', n => n.id === d.id);
            d3.selectAll('.link').classed('active', l => l.source.id === d.id || l.target.id === d.id);
            
            const sidebar = document.getElementById('sidebar');
            document.getElementById('nodeTitle').textContent = d.label;
            document.getElementById('nodeType').textContent = d.type.replace(/_/g, ' ');
            
            const relatedEdges = graph.edges.filter(e => e.source === d.id || e.target === d.id);
            const relatedNodes = relatedEdges.map(e => e.source === d.id ? e.target : e.source).map(id => graph.nodes.find(n => n.id === id)).filter(Boolean);
            
            let html = `
                <div class="sidebar-section">
                    <div class="sidebar-label">Description</div>
                    <div class="sidebar-value">${d.description || 'No description'}</div>
                </div>
            `;
            
            // Add type-specific metadata
            if (d.type === 'person' && d.actionsOwned) {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Workload</div>
                        <table class="metadata-table">
                            <tr><td>Actions Owned:</td><td>${d.actionsOwned}</td></tr>
                            <tr><td>Last Active:</td><td>${d.lastActive}</td></tr>
                        </table>
                    </div>
                `;
            } else if (d.type === 'action_item') {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Details</div>
                        <table class="metadata-table">
                            <tr><td>Owner:</td><td>${d.owner || 'Unassigned'}</td></tr>
                            <tr><td>Deadline:</td><td>${d.deadline || 'No deadline'}</td></tr>
                            <tr><td>Status:</td><td>${d.status || 'Open'}</td></tr>
                            ${d.isOverdue ? '<tr><td>Status:</td><td style="color: #C0392B;">⚠️ OVERDUE</td></tr>' : ''}
                        </table>
                    </div>
                `;
            } else if (d.type === 'meeting') {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Attendees</div>
                        <div class="sidebar-value">
                            ${d.attendees?.map(a => `<div class="relation-tag">${a}</div>`).join('') || 'No attendees'}
                        </div>
                    </div>
                `;
            } else if (d.type === 'blocker') {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Severity</div>
                        <div class="sidebar-value" style="color: ${d.severity === 'high' ? '#C0392B' : '#F39C12'}">${d.severity || 'Unknown'}</div>
                    </div>
                `;
            }
            
            // Add relationships
            if (relatedEdges.length > 0) {
                html += `
                    <div class="sidebar-section">
                        <div class="sidebar-label">Relationships (${relatedEdges.length})</div>
                        <div class="sidebar-value">
                            ${relatedEdges.map(e => {
                                const related = graph.nodes.find(n => n.id === (e.source === d.id ? e.target : e.source));
                                return related ? `<div class="relation-tag">${e.relation} <span class="entity-link" onclick="selectNodeByLabel('${related.label}')">${related.label.substring(0, 20)}</span></div>` : '';
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('nodeDetails').innerHTML = html;
            sidebar.classList.remove('hidden');
        }
        
        function selectNodeByLabel(label) {
            const node = graph.nodes.find(n => n.label === label || n.label.includes(label));
            if (node) {
                selectNode(node, { stopPropagation: () => {} });
            }
        }
        
        function drag(simulation) {
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }
            
            return d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended);
        }
        
        function resetZoom() {
            d3.select('#graph').transition().duration(750).call(d3.zoom().transform, d3.zoomIdentity);
        }
        
        document.getElementById('forceStrength').addEventListener('input', (e) => {
            const strength = parseFloat(e.target.value);
            if (simulation) {
                simulation.force('charge', d3.forceManyBody().strength(-400 * strength));
                simulation.alpha(0.3).restart();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('sidebar').classList.add('hidden');
            }
        });
        
        window.addEventListener('load', loadGraph);
    </script>
</body>
</html>
